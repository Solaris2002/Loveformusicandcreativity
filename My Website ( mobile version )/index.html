<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#8B2FC9">
    <title>Love For Music and Creativity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --purple: oklch(0.592 0.249 0.584);
            --dark-purple: oklch(0.38 0.2 0.584);
            --rose: oklch(0.459 0.187 3.815);
            --light-purple: oklch(0.75 0.12 0.584);
            --white: #fff;
            --nav-height: 64px;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            background-color: var(--purple);
            background-image:
                radial-gradient(ellipse at 20% 20%, oklch(0.45 0.25 0.584) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, oklch(0.38 0.18 3.815) 0%, transparent 50%);
            min-height: 100vh;
            font-family: 'Lora', Georgia, serif;
            padding-bottom: 60px;
        }

        /* ── HEADER ── */
        .site-header {
            padding: clamp(24px, 6vw, 56px) 20px clamp(16px, 4vw, 32px);
            text-align: center;
        }

        .site-header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            font-size: clamp(28px, 7vw, 60px);
            color: var(--white);
            line-height: 1.15;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 24px rgba(0,0,0,0.3);
        }

        .site-header h2 {
            font-family: 'Lora', Georgia, serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(14px, 3.5vw, 24px);
            color: rgba(255,255,255,0.85);
            margin-top: 8px;
        }

        /* ── NAV ── */
        .topnav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 2px 16px rgba(0,0,0,0.15);
        }

        /* Hamburger toggle – hidden on desktop */
        .nav-toggle {
            display: none;
        }

        .hamburger {
            display: none;
            width: 100%;
            padding: 16px 20px;
            background: none;
            border: none;
            cursor: pointer;
            align-items: center;
            justify-content: space-between;
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--purple);
        }

        .hamburger-icon {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hamburger-icon span {
            display: block;
            width: 26px;
            height: 2.5px;
            background: var(--purple);
            border-radius: 2px;
            transition: transform 0.3s, opacity 0.3s;
        }

        /* Nav links container */
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            display: block;
            color: var(--purple);
            text-align: center;
            padding: 18px 16px;
            text-decoration: none;
            font-size: clamp(13px, 2vw, 18px);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: 0.3px;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .nav-links a:active {
            background-color: var(--rose);
            color: var(--white);
        }

        /* ── NOTICE ── */
        .notice {
            text-align: center;
            color: rgba(255,255,255,0.75);
            font-style: italic;
            font-size: clamp(12px, 2.5vw, 18px);
            padding: clamp(16px, 4vw, 32px) 16px 0;
        }

        /* ── HERO IMAGE ── */
        .hero-image-wrap {
            display: flex;
            justify-content: center;
            padding: clamp(24px, 5vw, 48px) 16px 0;
        }

        .hero-image-wrap img {
            width: min(400px, 90vw);
            height: auto;
            aspect-ratio: 1;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.6);
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.35);
            display: block;
        }

        /* ── SEARCH (kept functional) ── */
        

        /* ── MOBILE BREAKPOINT ── */
        @media (max-width: 640px) {
            .hamburger { display: flex; }

            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
            }

            .nav-toggle:checked ~ .nav-links {
                display: flex;
            }

            /* Animate hamburger to X when open */
            .nav-toggle:checked ~ .hamburger .hamburger-icon span:nth-child(1) {
                transform: translateY(7.5px) rotate(45deg);
            }
            .nav-toggle:checked ~ .hamburger .hamburger-icon span:nth-child(2) {
                opacity: 0;
            }
            .nav-toggle:checked ~ .hamburger .hamburger-icon span:nth-child(3) {
                transform: translateY(-7.5px) rotate(-45deg);
            }

            .nav-links a {
                padding: 16px 24px;
                border-top: 1px solid rgba(139,47,201,0.1);
                text-align: left;
                font-size: 17px;
            }
        }

        /* ── SAFE AREA (iPhone notch/home bar) ── */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            body { padding-bottom: calc(60px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <h1>Love For Music<br>and Creativity</h1>
        <h2>Welcome everyone! Sharing my music memories.</h2>
    </header>

    <!-- ── RESPONSIVE NAV ── -->
    <nav class="topnav">
        <!-- CSS-only hamburger trick: checkbox drives the open/close state -->
        <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">

        <label for="nav-toggle" class="hamburger" aria-label="Toggle navigation">
            <span>Menu</span>
            <span class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </label>

        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="images.html">Images</a>
            <a href="music.html">Music</a>
            <a href="performances.html">Performances</a>
            <a href="footage.html">Footage</a>
            <a href="other images.html">Other Images</a>
        </div>
    </nav>

    <p class="notice">(Also, this website I created myself will be updated when I have time.)</p>

    <div class="hero-image-wrap">
        <img src="Black Woman.jpg" alt="Art of a Black Woman">
    </div>

    <script>
        const input    = document.getElementById('searchInput');
        const btn      = document.getElementById('searchBtn');
        const noResult = document.getElementById('noResult');
        const sections = document.querySelectorAll('section');

        function clearAll() {
            sections.forEach(function(sec) {
                sec.classList.remove('matched');
                sec.querySelectorAll('.highlight').forEach(function(el) {
                    el.replaceWith(document.createTextNode(el.textContent));
                });
                sec.normalize();
            });
            noResult.style.display = 'none';
        }

        function highlightNode(node, term) {
            if (node.nodeType !== 3) return;
            var idx = node.textContent.toLowerCase().indexOf(term);
            if (idx === -1) return;
            var span = document.createElement('span');
            span.className = 'highlight';
            span.textContent = node.textContent.slice(idx, idx + term.length);
            var after = node.splitText(idx);
            after.textContent = after.textContent.slice(term.length);
            node.parentNode.insertBefore(span, after);
        }

        function doSearch() {
            clearAll();
            var term = input.value.trim().toLowerCase();
            if (!term) return;
            var firstMatch = null;
            sections.forEach(function(sec) {
                if (sec.textContent.toLowerCase().includes(term)) {
                    sec.classList.add('matched');
                    var walker = document.createTreeWalker(sec, NodeFilter.SHOW_TEXT);
                    var nodes = [];
                    while (walker.nextNode()) nodes.push(walker.currentNode);
                    nodes.forEach(function(n) { highlightNode(n, term); });
                    if (!firstMatch) firstMatch = sec;
                }
            });
            if (firstMatch) {
                firstMatch.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                noResult.style.display = 'block';
                setTimeout(function() { noResult.style.display = 'none'; }, 2500);
            }
        }

        btn.addEventListener('click', doSearch);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doSearch();
        });
    </script>

</body>
</html>
